name: Documentation

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      INDEXNOW_KEY: ${{ secrets['INDEXNOW_KEY'] }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 9.0.x

      - name: Install DocFX
        run: dotnet tool update -g docfx

      - name: Build docs
        run: docfx docs/docfx.json

      - name: Normalize IndexNow key
        if: ${{ env.INDEXNOW_KEY != '' }}
        run: |
          normalized_key="$(printf '%s' "$INDEXNOW_KEY" | tr -d '\r\n[:space:]')"
          printf 'INDEXNOW_KEY=%s\n' "$normalized_key" >> "$GITHUB_ENV"

      - name: Add IndexNow key file
        if: ${{ env.INDEXNOW_KEY != '' }}
        run: |
          printf "%s" "$INDEXNOW_KEY" > "docs/_site/${INDEXNOW_KEY}.txt"

      - name: Log IndexNow key URL
        if: ${{ env.INDEXNOW_KEY != '' }}
        run: |
          printf 'IndexNow key URL: https://aalmada.github.io/BookStore/%s.txt\n' "$INDEXNOW_KEY"

      - name: Fix README images
        run: |
          mkdir -p docs/_site/docs/images
          cp -r docs/images/* docs/_site/docs/images/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: docs/_site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    env:
      INDEXNOW_KEY: ${{ secrets['INDEXNOW_KEY'] }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Normalize IndexNow key
        if: ${{ env.INDEXNOW_KEY != '' }}
        run: |
          normalized_key="$(printf '%s' "$INDEXNOW_KEY" | tr -d '\r\n[:space:]')"
          printf 'INDEXNOW_KEY=%s\n' "$normalized_key" >> "$GITHUB_ENV"

      - name: Submit IndexNow URLs
        if: ${{ env.INDEXNOW_KEY != '' }}
        run: |
          python - <<'PY'
          import json
          import os
          import time
          import xml.etree.ElementTree as ET
          from urllib import request
          from urllib.error import HTTPError

          endpoint = "https://api.indexnow.org/indexnow"
          key = os.environ["INDEXNOW_KEY"]
          key_location = f"https://aalmada.github.io/BookStore/{key}.txt"
          sitemap_url = "https://aalmada.github.io/BookStore/sitemap.xml"

          # GitHub Pages can take a short time to serve the just-deployed content.
          # Retry key-file verification before attempting IndexNow submission.
          max_attempts = 8
          for attempt in range(1, max_attempts + 1):
            try:
              with request.urlopen(key_location, timeout=30) as resp:
                body = resp.read().decode("utf-8").strip()
                if body == key:
                  print(f"IndexNow key file verified on attempt {attempt}.")
                  break
                raise RuntimeError(
                  f"Key file content mismatch on attempt {attempt}. "
                  f"Expected key value, got: {body!r}"
                )
            except Exception as ex:
              if attempt == max_attempts:
                print(
                  "IndexNow key file is not reachable/valid after deployment. "
                  "Skipping IndexNow submission to avoid failing docs publish."
                )
                print(f"Last verification error: {ex}")
                raise SystemExit(0)
              print(f"Waiting for key file propagation (attempt {attempt}/{max_attempts}): {ex}")
              time.sleep(15)

          with request.urlopen(sitemap_url, timeout=30) as resp:
              xml_data = resp.read()

          ns = {"sm": "http://www.sitemaps.org/schemas/sitemap/0.9"}
          root = ET.fromstring(xml_data)

          urls = []
          for loc in root.findall("sm:url/sm:loc", ns):
              if loc.text:
                  urls.append(loc.text.strip())

          if not urls:
              raise SystemExit("No URLs found in sitemap.xml for IndexNow submission.")

          payload = {
              "host": "aalmada.github.io",
              "key": key,
              "keyLocation": key_location,
              "urlList": urls,
          }

          body = json.dumps(payload).encode("utf-8")
          req = request.Request(
              endpoint,
              data=body,
              headers={"Content-Type": "application/json"},
              method="POST",
          )

          try:
              with request.urlopen(req, timeout=30) as response:
                  print(f"IndexNow response: {response.status}")
                  print(response.read().decode("utf-8"))
          except HTTPError as e:
              print(f"IndexNow error: {e.code} {e.reason}")
              if e.code == 403:
                print(
                  "IndexNow returned 403. This usually means key validation is "
                  "not yet visible to IndexNow or the key/keyLocation does not match. "
                  "Skipping failure so docs deployment still succeeds."
                )
                raise SystemExit(0)
              raise
          PY
