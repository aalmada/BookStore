name: Documentation

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      INDEXNOW_KEY: ${{ secrets['INDEXNOW_KEY'] }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 9.0.x

      - name: Install DocFX
        run: dotnet tool update -g docfx

      - name: Build docs
        run: docfx docs/docfx.json

      - name: Add IndexNow key file
        if: ${{ env.INDEXNOW_KEY != '' }}
        run: |
          printf "%s" "$INDEXNOW_KEY" > "docs/_site/${INDEXNOW_KEY}.txt"

      - name: Fix README images
        run: |
          mkdir -p docs/_site/docs/images
          cp -r docs/images/* docs/_site/docs/images/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: docs/_site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    env:
      INDEXNOW_KEY: ${{ secrets['INDEXNOW_KEY'] }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Submit IndexNow URLs
        if: ${{ env.INDEXNOW_KEY != '' }}
        run: |
          python - <<'PY'
          import json
          import os
          import xml.etree.ElementTree as ET
          from urllib import request
          from urllib.error import HTTPError

          endpoint = "https://api.indexnow.org/indexnow"
          key = os.environ["INDEXNOW_KEY"]
          key_location = f"https://aalmada.github.io/BookStore/{key}.txt"
          sitemap_url = "https://aalmada.github.io/BookStore/sitemap.xml"

          with request.urlopen(sitemap_url, timeout=30) as resp:
              xml_data = resp.read()

          ns = {"sm": "http://www.sitemaps.org/schemas/sitemap/0.9"}
          root = ET.fromstring(xml_data)

          urls = []
          for loc in root.findall("sm:url/sm:loc", ns):
              if loc.text:
                  urls.append(loc.text.strip())

          if not urls:
              raise SystemExit("No URLs found in sitemap.xml for IndexNow submission.")

          payload = {
              "host": "aalmada.github.io",
              "key": key,
              "keyLocation": key_location,
              "urlList": urls,
          }

          body = json.dumps(payload).encode("utf-8")
          req = request.Request(
              endpoint,
              data=body,
              headers={"Content-Type": "application/json"},
              method="POST",
          )

          try:
              with request.urlopen(req, timeout=30) as response:
                  print(f"IndexNow response: {response.status}")
                  print(response.read().decode("utf-8"))
          except HTTPError as e:
              print(f"IndexNow error: {e.code} {e.reason}")
              raise
          PY
